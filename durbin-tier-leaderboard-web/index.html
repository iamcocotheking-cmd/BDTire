<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DURBIN Tier Leaderboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-glow one"></div>
  <div class="bg-glow two"></div>

  <main class="page">
    <header class="hero">
      <div>
        <p class="eyebrow">DURBIN LEADERBOARD</p>
        <h1>Tier List</h1>
        <p class="subtitle">Live leaderboard from Firebase Firestore. Shows LT/HT tiers for Sword, Tank, Crystal, NetPot and more.</p>
      </div>
      <a class="discord" href="https://discord.gg/PqnbXNrtHR" target="_blank" rel="noreferrer">Join Discord</a>
    </header>

    <section class="controls card">
      <label>
        Search player
        <input id="searchInput" type="text" placeholder="Search name or email..." />
      </label>
      <label>
        Mode
        <select id="modeSelect">
          <option value="tier">Overall</option>
          <option value="sword">Sword</option>
          <option value="axe">Axe</option>
          <option value="tank">Tank</option>
          <option value="crystal">Crystal</option>
          <option value="netpot">NetPot</option>
          <option value="uhc">UHC</option>
          <option value="smp">SMP</option>
          <option value="pot">Pot</option>
        </select>
      </label>
      <button id="refreshBtn">Refresh</button>
    </section>

    <section class="card status-card">
      <div id="statusText">Loading Firebase data...</div>
    </section>

    <section id="leaderboard" class="leaderboard"></section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
